name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  ci:
    name: Build, Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Type-check
        run: pnpm tsc --noEmit

      - name: Unit tests
        run: pnpm test

      - name: Coverage
        run: pnpm test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # Build-time placeholder — runtime value comes from the deployment env.
          # Required because <ClerkProvider> throws "Missing publishableKey" while
          # Next statically prerenders framework pages (/_not-found, error). This is
          # Clerk's canonical example key (decodes to clerk.example.com$); it only
          # satisfies the provider parse — no Clerk instance is contacted at build.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
